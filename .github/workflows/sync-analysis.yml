name: Sync analysis from data repo

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-analysis
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATA_REPO_SSH_KEY: ${{ secrets.PROJECT_INDIA_DATA_SSH_KEY }}
      DATA_REPO_TOKEN: ${{ secrets.PROJECT_INDIA_DATA_TOKEN }}

    steps:
      - name: Checkout analysis repository
        uses: actions/checkout@v4

      - name: Check data repository access secret
        run: |
          set -euo pipefail
          if [ -z "${DATA_REPO_SSH_KEY:-}" ] && [ -z "${DATA_REPO_TOKEN:-}" ]; then
            cat <<'EOF'
          Missing data repository access secret.

          Add one of these secrets to knirantar/Project-India-Analysis:
          - PROJECT_INDIA_DATA_SSH_KEY: deploy key/private key with read access to knirantar/Project-India-Data
          - PROJECT_INDIA_DATA_TOKEN: fine-grained PAT with read access to knirantar/Project-India-Data
          EOF
            exit 1
          fi

      - name: Checkout data repository with SSH key
        if: env.DATA_REPO_SSH_KEY != ''
        uses: actions/checkout@v4
        with:
          repository: knirantar/Project-India-Data
          ssh-key: ${{ env.DATA_REPO_SSH_KEY }}
          path: data-repo

      - name: Checkout data repository with token
        if: env.DATA_REPO_SSH_KEY == '' && env.DATA_REPO_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: knirantar/Project-India-Data
          token: ${{ env.DATA_REPO_TOKEN }}
          path: data-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Build topic analysis artifacts
        run: |
          set -euo pipefail
          python -m project_india_analysis.cli \
            --data-dir data-repo/data \
            --output-dir analysis_output

      - name: Install web dependencies
        run: npm ci

      - name: Build intelligence web app
        env:
          PROJECT_INDIA_DATA_DIR: data-repo/data
        run: |
          set -euo pipefail
          npm run build

      - name: Commit refreshed presentation data
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add analysis_output public/intelligence-data.json

          if git diff --cached --quiet; then
            echo "No analysis changes to commit."
            exit 0
          fi

          git commit -m "Refresh analysis presentation data"
          git push

      - name: Web deployment note
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Intelligence web app

          This workflow refreshed `analysis_output/` and `public/intelligence-data.json`
          from `knirantar/Project-India-Data`, then built the Next.js app.

          Deploy the repository as a Next.js app on Vercel, Netlify, or any Node host.
          EOF
